services:
  postgres:
    image: postgres:16-alpine
    container_name: mercado_express_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mercado_express_app
    restart: unless-stopped
    env_file: .env.${NODE_ENV}
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      - postgres

volumes:
  postgres_data:
